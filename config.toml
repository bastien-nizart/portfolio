baseURL = 'https://bastien.nizart.me/'
title = 'Bastien Nizart'
theme = 'hugo-coder'
languageCode = "fr"
defaultContentLanguage = "fr"
paginate = 20
pygmentsStyle = "bw"
pygmentsCodeFences = true
pygmentsCodeFencesGuessSyntax = true
enableEmoji = true

# --------------------
# | ## Paramètres ## |
# --------------------

[params]
author = "Bastien Nizart"
description = "Site personnel de Bastien Nizart"
keywords = "blog,développeur,personnel"
info = ["Étudiant", "Développeur Back End"]
avatarURL = "images/profil.png"
dateFormat = "2 January, 2006"
since = 2022
# Right To Left, shift content direction for languagues such as Arabic
rtl = false

# -----------------------
# | ## Couleur Thème ## |
# -----------------------

# Specify light/dark colorscheme
# Supported values:
# "auto" (use preference set by browser)
# "dark" (dark background, light foreground)
# "light" (light background, dark foreground) (default)
colorScheme = "auto"

# Hide the toggle button, along with the associated vertical divider
hideColorSchemeToggle = false

# Series see also post count
maxSeeAlsoItems = 5

# If you want to implement a Content-Security-Policy, add this section
[params.csp]
childsrc = ["'self'"]
fontsrc = ["'self'", "https://fonts.gstatic.com", "https://cdn.jsdelivr.net/"]
formaction = ["'self'"]
framesrc = ["'self'"]
imgsrc = ["'self'"]
objectsrc = ["'none'"]
stylesrc = [
  "'self'",
  "'unsafe-inline'",
  "https://fonts.googleapis.com/",
  "https://cdn.jsdelivr.net/"
]
scriptsrc = [
  "'self'", 
  "'unsafe-inline'", 
]
prefetchsrc = ["'self'"]
# connect-src directive – defines valid targets for to XMLHttpRequest (AJAX), WebSockets or EventSource
connectsrc = ["'self'", "https://www.google-analytics.com"]

[taxonomies]
category = "categories"
series = "series"
tag = "tags"
author = "authors"

# ------------------------
# | ## Icones Sociaux ## |
# ------------------------

[[params.social]]
name = "Github"
icon = "fa fa-2x fa-github"
weight = 1
url = "https://github.com/bastien-nizart/"
target = "_blank"

[[params.social]]
name = "Mail"
icon = "fa fa-2x fa-envelope"
weight = 3
url = "mailto:bastien@nizart.me"
target = "_blank"

# -----------------
# | ## Anglais ## |
# -----------------

[languages.en]
languageName = ":uk:"

[languages.en.params]
author = "Bastien Nizart"
info = ["Student", "Back End Dev"]
description = "Personnal site of Bastien Nizart"
keywords = "blog,developper,personnal"

[[languages.en.menu.main]]
name = "About"
weight = 1
url = "about/"

[[languages.en.menu.main]]
name = "Projects"
weight = 2
url = "projets/"

# ------------------
# | ## Francais ## |
# ------------------

[languages.fr]
languageName = ":fr:"
title = "Bastien Nizart"

[[languages.fr.menu.main]]
name = "À propos"
weight = 1
